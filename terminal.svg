<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 470" width="580" height="470" font-family="'DejaVu Sans Mono','Courier New',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e15"/><stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <linearGradient id="screenfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a141f"/><stop offset="1" stop-color="#08111a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="win"><rect x="6" y="6" width="568" height="458" rx="12"/></clipPath>
    <clipPath id="scr"><rect x="140" y="92" width="300" height="256" rx="10"/></clipPath>
    <style>
      @keyframes blink { 0%,48%{opacity:1} 49%,100%{opacity:0} }
      @keyframes flick { 0%,44%{opacity:0} 45%,92%{opacity:.55} 93%,100%{opacity:0} }
      @keyframes scan { 0%{transform:translateY(-6px)} 100%{transform:translateY(258px)} }
      @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.95} }
      @keyframes tw { 0%{opacity:1} 50%{opacity:.82} 100%{opacity:1} }
      .cur { animation: blink 1.05s steps(1) infinite; }
      .lyB { animation: flick 2.4s steps(1) infinite; }
      .lyA { animation: tw 3s ease-in-out infinite; }
      .scan { animation: scan 4.5s linear infinite; }
      .brd { animation: pulse 3.6s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="6" y="6" width="568" height="458" rx="12" fill="url(#bg)"/>
  <rect class="brd" x="6" y="6" width="568" height="458" rx="12" fill="none" stroke="#1c9fe0" stroke-width="1.6" filter="url(#softglow)"/>

  <!-- title bar -->
  <path d="M6 18 A12 12 0 0 1 18 6 H562 A12 12 0 0 1 574 18 V40 H6 Z" fill="#0c141e"/>
  <circle cx="26" cy="23" r="6" fill="#ff5f56"/><circle cx="46" cy="23" r="6" fill="#ffbd2e"/><circle cx="66" cy="23" r="6" fill="#27c93f"/>
  <text x="290" y="27" text-anchor="middle" fill="#5f89ad" font-size="12">root@kali: ~</text>
  <line x1="6" y1="40" x2="574" y2="40" stroke="#1c9fe0" stroke-width="1" opacity="0.3"/>

  <g clip-path="url(#win)">
    <!-- Kali prompt -->
    <text x="22" y="62" font-size="13" xml:space="preserve"><tspan fill="#2ec4ff">┌──(</tspan><tspan fill="#3ad67f">kali</tspan><tspan fill="#7a97b5">@</tspan><tspan fill="#3ad67f">kali</tspan><tspan fill="#2ec4ff">)-[</tspan><tspan fill="#cdd9e5">~</tspan><tspan fill="#2ec4ff">]</tspan></text>
    <text x="22" y="80" font-size="13" xml:space="preserve"><tspan fill="#2ec4ff">└─</tspan><tspan fill="#3ad67f">$</tspan><tspan fill="#cdd9e5"> ./unleash --dragon --mode=root</tspan></text>

    <!-- laptop base (trapezoid) -->
    <polygon points="108,352 472,352 512,408 68,408" fill="#0c1826" stroke="#1c9fe0" stroke-width="1.6" filter="url(#glow)"/>
    <line x1="140" y1="349" x2="440" y2="349" stroke="#1c9fe0" stroke-width="3"/>
    <polygon points="250,392 330,392 340,400 240,400" fill="#0a1420" stroke="#155a82" stroke-width="1"/>
    <g stroke="#12496b" stroke-width="1.4">
      <line x1="120" y1="366" x2="460" y2="366"/><line x1="112" y1="378" x2="468" y2="378"/><line x1="102" y1="392" x2="478" y2="392"/>
    </g>

    <!-- laptop screen -->
    <rect x="140" y="92" width="300" height="256" rx="10" fill="url(#screenfill)" stroke="#1c9fe0" stroke-width="2" filter="url(#glow)"/>
    <rect x="147" y="99" width="286" height="242" rx="7" fill="none" stroke="#10405f" stroke-width="1"/>

